<div class="certificat_container">
    <div class="certificat_left">
        <div>
            <img [src]="ImageCertificat" alt="">
        </div>
        <div>
            <h2>{{ NomCertificat }}</h2>
            <p>{{ Description }}</p>
            <p>{{ Temps }}</p>
        </div>
    </div>
    <div class="certificat_right">
        <a [href]="LinkCertificat">
            <img [src]="IconLink" alt="">
        </a>
    </div>
</div>
